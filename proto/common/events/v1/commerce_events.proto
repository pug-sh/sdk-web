edition = "2023";
package common.events.v1;

import "buf/validate/validate.proto";
import "common/events/v1/options.proto";

option go_package = "github.com/pug-sh/pug/internal/gen/proto/common/events/v1;commoneventsv1";

// Commerce events.
//
// Product browsing, cart manipulation, checkout, and purchase events.
//
// Conventions:
//   - `price` denotes a single-item price (e.g. on product_viewed, add_to_cart).
//   - `amount` denotes a transaction total (e.g. on cart_viewed, checkout_started,
//     purchase, order_refunded).
//   - `currency` is an uppercase ISO 4217 code (e.g. "USD", "EUR"). When you
//     populate `price` or `amount`, populate `currency` too — both are
//     individually validated when present.
//   - Money fields use the major currency unit (dollars, euros, yen).
//     These events are revenue signals for analytics; the order/checkout
//     system is the source of truth. See options.proto for the package-wide
//     money precision contract.

message ProductViewedProperties {
  option (common.events.v1.kind) = "product_viewed";
  string product_id = 1 [(buf.validate.field).required = true];
  string product_name = 2;
  string category = 3;
  string brand = 4;
  string sku = 5;
  double price = 6 [(buf.validate.field).double.gt = 0];
  string currency = 7 [(buf.validate.field).string.pattern = "^[A-Z]{3}$"];
}

// A list/category/search-results impression — fired when the user views a
// collection of products rather than a single product detail page.
message ProductListViewedProperties {
  option (common.events.v1.kind) = "product_list_viewed";
  string list_id = 1 [(buf.validate.field).required = true];
  string list_name = 2;
  string category = 3;
  int32 item_count = 4 [(buf.validate.field).int32.gte = 0];
}

message AddToCartProperties {
  option (common.events.v1.kind) = "add_to_cart";
  string product_id = 1 [(buf.validate.field).required = true];
  double price = 2 [(buf.validate.field).double.gt = 0];
  string currency = 3 [(buf.validate.field).string.pattern = "^[A-Z]{3}$"];
  string cart_id = 4;
  int32 quantity = 5 [(buf.validate.field).int32.gte = 0];
  string category = 6;
  string brand = 7;
  string sku = 8;
}

message RemoveFromCartProperties {
  option (common.events.v1.kind) = "remove_from_cart";
  string product_id = 1 [(buf.validate.field).required = true];
  double price = 2 [(buf.validate.field).double.gt = 0];
  string currency = 3 [(buf.validate.field).string.pattern = "^[A-Z]{3}$"];
  string cart_id = 4;
  int32 quantity = 5 [(buf.validate.field).int32.gte = 0];
  string category = 6;
  string brand = 7;
  string sku = 8;
}

message CartViewedProperties {
  option (common.events.v1.kind) = "cart_viewed";
  string cart_id = 1;
  int32 item_count = 2 [(buf.validate.field).int32.gte = 0];
  double amount = 3 [(buf.validate.field).double.gt = 0];
  string currency = 4 [(buf.validate.field).string.pattern = "^[A-Z]{3}$"];
}

message WishlistAddedProperties {
  option (common.events.v1.kind) = "wishlist_added";
  string product_id = 1 [(buf.validate.field).required = true];
  string wishlist_id = 2;
  double price = 3 [(buf.validate.field).double.gt = 0];
  string currency = 4 [(buf.validate.field).string.pattern = "^[A-Z]{3}$"];
}

message WishlistRemovedProperties {
  option (common.events.v1.kind) = "wishlist_removed";
  string product_id = 1 [(buf.validate.field).required = true];
  string wishlist_id = 2;
}

message CouponAppliedProperties {
  option (common.events.v1.kind) = "coupon_applied";
  string coupon_id = 1 [(buf.validate.field).required = true];
  string coupon_code = 2;
  string cart_id = 3;
  double discount_amount = 4 [(buf.validate.field).double.gt = 0];
  string currency = 5 [(buf.validate.field).string.pattern = "^[A-Z]{3}$"];
}

message CouponRemovedProperties {
  option (common.events.v1.kind) = "coupon_removed";
  string coupon_id = 1 [(buf.validate.field).required = true];
  string coupon_code = 2;
  string cart_id = 3;
  string reason = 4;
}

message CheckoutStartedProperties {
  option (common.events.v1.kind) = "checkout_started";
  string product_id = 1;
  double amount = 2 [(buf.validate.field).double.gt = 0];
  string currency = 3 [(buf.validate.field).string.pattern = "^[A-Z]{3}$"];
  string cart_id = 4;
  string checkout_id = 5;
  int32 item_count = 6 [(buf.validate.field).int32.gte = 0];
}

message CheckoutStepCompletedProperties {
  option (common.events.v1.kind) = "checkout_step_completed";
  string checkout_id = 1 [(buf.validate.field).required = true];
  string step = 2 [(buf.validate.field).required = true];
  int32 step_index = 3 [(buf.validate.field).int32.gte = 0];
}

// Equivalent to Segment's "Order Completed" event. Fires once per successful
// order, after payment is confirmed.
message PurchaseProperties {
  option (common.events.v1.kind) = "purchase";
  string product_id = 1;
  double amount = 2 [(buf.validate.field).double.gt = 0];
  string currency = 3 [(buf.validate.field).string.pattern = "^[A-Z]{3}$"];
  string order_id = 4;
  int32 quantity = 5 [(buf.validate.field).int32.gte = 0];
  string category = 6;
  string brand = 7;
  string sku = 8;
}

message OrderRefundedProperties {
  option (common.events.v1.kind) = "order_refunded";
  string order_id = 1 [(buf.validate.field).required = true];
  double amount = 2 [(buf.validate.field).double.gt = 0];
  string currency = 3 [(buf.validate.field).string.pattern = "^[A-Z]{3}$"];
  string reason = 4;
}
