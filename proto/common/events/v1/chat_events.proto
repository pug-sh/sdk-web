edition = "2023";
package common.events.v1;

import "buf/validate/validate.proto";
import "google/protobuf/duration.proto";
import "common/events/v1/options.proto";

option go_package = "github.com/pug-sh/pug/internal/gen/proto/common/events/v1;commoneventsv1";

// Chat events.
//
// `conversation_id` is the durable identifier for a chat (DM, group, channel).
// `member_id` is the conversation-membership ID, distinct from the SDK
// distinct_id and from any global user_id.
// Threaded messages set `thread_id`; the original message that started the
// thread has `parent_message_id == ""`, replies set `parent_message_id` to
// the thread's root message.
//
// Common values for freeform `*_type` fields (not enforced, document only):
//   conversation_type: "dm", "group", "channel", "broadcast"
//   message_type:      "text", "image", "video", "audio", "file", "system"
//   call_type:         "audio", "video", "screen_share"
//   attachment_type:   "image", "video", "audio", "file", "link", "sticker"
//
// chat_typing_started and chat_typing_stopped have no member_id field — the
// typer is the SDK's distinct_id on the wrapping Event. Do not add member_id
// "for clarity"; consumers can join on distinct_id when needed.

message ChatCreatedProperties {
  option (common.events.v1.kind) = "chat_created";
  string conversation_id = 1 [(buf.validate.field).required = true];
  string conversation_type = 2;
  int32 participant_count = 3 [(buf.validate.field).int32.gte = 0];
}

message ChatJoinedProperties {
  option (common.events.v1.kind) = "chat_joined";
  string conversation_id = 1 [(buf.validate.field).required = true];
  string conversation_type = 2;
}

message ChatLeftProperties {
  option (common.events.v1.kind) = "chat_left";
  string conversation_id = 1 [(buf.validate.field).required = true];
  string conversation_type = 2;
  string reason = 3;
}

message ChatDeletedProperties {
  option (common.events.v1.kind) = "chat_deleted";
