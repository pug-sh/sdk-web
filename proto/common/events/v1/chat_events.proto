// mute_duration is optional — populate when the mute is time-bounded
// (e.g. "mute for 1h"); leave unset for indefinite mutes.
message ChatMemberMutedProperties {
  option (common.events.v1.kind) = "chat_member_muted";
  string conversation_id = 1 [(buf.validate.field).required = true];
  string member_id = 2 [(buf.validate.field).required = true];
  google.protobuf.Duration mute_duration = 3 [(buf.validate.field).duration.gte = {seconds: 0}];
}

// User-level block (not conversation-scoped), so no conversation_id.
message ChatUserBlockedProperties {
  option (common.events.v1.kind) = "chat_user_blocked";
  string user_id = 1 [(buf.validate.field).required = true];
}

// `reaction` is the literal reaction value (emoji, shortcode, sticker id),
// not a category. Compare reaction_type if a future schema needs to
// distinguish emoji from sticker from gif reactions.
message ChatReactionAddedProperties {
  option (common.events.v1.kind) = "chat_reaction_added";
  string conversation_id = 1 [(buf.validate.field).required = true];
  string message_id = 2;
  string reaction = 3 [(buf.validate.field).required = true];
  string thread_id = 4;
}

// `reaction` is the literal reaction value (emoji, shortcode, sticker id),
