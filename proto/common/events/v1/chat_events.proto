  string message_id = 2;
  string conversation_type = 3;
  string message_type = 4;
  int32 character_count = 5 [(buf.validate.field).int32.gte = 0];
  int32 attachment_count = 6 [(buf.validate.field).int32.gte = 0];
  string thread_id = 7;
  string parent_message_id = 8;
