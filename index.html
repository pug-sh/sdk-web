<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cotton SDK Test</title>
  </head>
  <body>
    <h1>Cotton SDK Manual Test</h1>
    <button id="test-click">Normal Click</button>
    <button id="rage-click">Rage Click Me (3x fast)</button>
    <div id="dead-zone" style="width: 200px; height: 200px; background: lightgray; margin-top: 20px">
      Dead Click Zone (Click me, I do nothing)
    </div>

    <div style="height: 2000px; background: linear-gradient(to bottom, #fff, #000)">Scroll down...</div>

    <form id="test-form" action="/submit">
      <input type="text" name="username" placeholder="Interact with me" />
      <button type="submit">Submit Form</button>
    </form>

    <script type="module">
      import { init } from './dist/index.js'
      init('my-project-id', { endpoint: 'http://localhost:9000' })

      let clickCount = 0
      document.getElementById('test-click').addEventListener('click', () => {
        document.title = `Click ${++clickCount}`
      })
      document.getElementById('rage-click').addEventListener('click', () => {
        document.title = `Rage ${++clickCount}`
      })

      console.log('Cotton SDK initialized!')
    </script>
  </body>
</html>
