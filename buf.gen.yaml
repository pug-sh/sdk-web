# Generates protobuf-es TypeScript for the SDK wire protos (the 3 SDK services +
# PropertyValue) and the well-known-event *Properties schemas. Unlike the mobile SDKs
# (which consume a descriptor set), pug-web validates and serializes these schemas at
# runtime, so the generated message classes are needed. Output is committed to src/gen
# and compiled by tsc like the rest of src/.
#
# google/protobuf/* resolve from @bufbuild/protobuf/wkt at runtime and are not emitted.
# buf/validate/* IS emitted — the pug protos import its field-option extensions
# (file_buf_validate_validate) via a relative path, so it must be generated alongside.
version: v2
clean: true
plugins:
  - local: protoc-gen-es
    out: src/gen
    opt:
      - target=ts
      - import_extension=js
