# Generates protobuf-es TypeScript for the SDK wire protos (the 3 SDK services +
# PropertyValue) and the well-known-event *Properties schemas. Unlike the mobile SDKs
# (which consume a descriptor set), pug-web validates and serializes these schemas at
# runtime, so the generated message classes are needed. Output is committed to src/gen
# and compiled by tsc like the rest of src/.
#
# google/protobuf/* resolve from @bufbuild/protobuf/wkt at runtime and are not emitted.
# buf/validate/* is generated here (the pug protos import its field-option extensions) but
# then stripped by scripts/strip-validate-deps.mjs in `make protos`: the SDK no longer
# validates client-side, and protobuf-es's fileDesc() rebuilds the dependency list from the
# deps array, so the ~73 KB validate_pb descriptor is dead weight in the bundle. The
# `(buf.validate.*)` option bytes remain as harmless unknown fields in the embedded descriptors.
version: v2
clean: true
plugins:
  - local: protoc-gen-es
    out: src/gen
    opt:
      - target=ts
      - import_extension=js
